<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050b0f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <title>CipherLane Chatbot</title>
  <style>
    :root {
      --font-ui: "Manrope", "Inter", "Segoe UI", system-ui, sans-serif;
      --font-display: "Space Grotesk", "Manrope", "Inter", "Segoe UI", system-ui, sans-serif;
      --cyan: #7be9f2;
      --blue: #3f6fd8;
      --panel: rgba(255, 255, 255, 0.055);
      --line: rgba(123, 233, 242, 0.18);
      --text: #f7f7f2;
      --muted: #c7d5dc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #05090d;
      color: var(--text);
      font-family: var(--font-ui);
    }

    body {
      min-height: 100vh;
      display: grid;
      background:
        linear-gradient(rgba(101, 224, 244, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(101, 224, 244, 0.055) 1px, transparent 1px),
        radial-gradient(circle at 50% 20%, rgba(63, 111, 216, 0.26), transparent 38%),
        linear-gradient(180deg, #05080b 0, #081015 100%);
      background-size: 96px 96px, 96px 96px, auto, auto;
    }

    .chat-app {
      width: min(960px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      background: rgba(5, 12, 18, 0.78);
    }

    .chat-header {
      padding: 22px clamp(18px, 4vw, 34px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 12, 18, 0.92);
    }

    .brand {
      display: grid;
      gap: 4px;
    }

    .brand h1 {
      margin: 0;
      color: #f5feff;
      font-family: var(--font-display);
      font-size: clamp(26px, 5vw, 40px);
      line-height: 1;
      letter-spacing: 0;
    }

    .brand span,
    .status {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      font-weight: 800;
    }

    .status {
      min-width: 86px;
      text-align: right;
    }

    .status::before {
      content: "";
      width: 9px;
      height: 9px;
      margin-right: 8px;
      display: inline-block;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 16px rgba(123, 233, 242, 0.7);
      vertical-align: middle;
    }

    .messages {
      min-height: 0;
      padding: clamp(18px, 4vw, 34px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
    }

    .message {
      max-width: min(680px, 86%);
      border: 1px solid rgba(119, 231, 247, 0.18);
      border-radius: 8px;
      padding: 12px 14px;
      color: #effcff;
      background: var(--panel);
      font-size: 15px;
      line-height: 1.45;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .connection-panel {
      padding: 14px clamp(18px, 4vw, 34px);
      display: grid;
      grid-template-columns: minmax(170px, 1.2fr) minmax(120px, 0.8fr) minmax(120px, 0.8fr) auto auto;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 12, 18, 0.9);
    }

    .connection-panel input,
    .connection-panel button {
      min-height: 42px;
      border-radius: 8px;
      font: 800 13px/1 var(--font-ui);
    }

    .connection-panel input {
      min-width: 0;
      border: 1px solid rgba(119, 231, 247, 0.24);
      padding: 0 12px;
      color: #ffffff;
      background: rgba(5, 12, 18, 0.9);
      outline: none;
    }

    .connection-panel input:focus {
      border-color: rgba(123, 233, 242, 0.78);
      box-shadow: 0 0 0 3px rgba(123, 233, 242, 0.14);
    }

    .connection-panel button {
      border: 0;
      padding: 0 14px;
      color: #031014;
      background: var(--cyan);
      cursor: pointer;
    }

    .connection-panel button.secondary {
      color: #f5feff;
      border: 1px solid rgba(119, 231, 247, 0.24);
      background: rgba(255, 255, 255, 0.04);
    }

    .message.bot {
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      color: #031014;
      background: var(--cyan);
      border-color: transparent;
    }

    .composer {
      padding: 16px clamp(18px, 4vw, 34px) 22px;
      display: grid;
      grid-template-columns: 1fr 112px;
      gap: 10px;
      border-top: 1px solid var(--line);
      background: rgba(5, 12, 18, 0.94);
    }

    .composer input,
    .composer select {
      width: 100%;
      min-height: 50px;
      border: 1px solid rgba(119, 231, 247, 0.28);
      border-radius: 8px;
      padding: 0 16px;
      color: #ffffff;
      background: rgba(5, 12, 18, 0.88);
      font: 700 15px/1 var(--font-ui);
      outline: none;
    }

    .composer select[hidden] {
      display: none;
    }

    .composer input:focus,
    .composer select:focus {
      border-color: rgba(123, 233, 242, 0.78);
      box-shadow: 0 0 0 3px rgba(123, 233, 242, 0.14);
    }

    .composer button,
    .seed-action {
      min-height: 50px;
      border: 0;
      border-radius: 8px;
      color: #031014;
      background: var(--cyan);
      font: 800 14px/1 var(--font-ui);
      cursor: pointer;
    }

    .seed-action {
      align-self: flex-start;
      min-height: 44px;
      padding: 0 18px;
    }

    .composer button:active,
    .seed-action:active {
      transform: translateY(1px);
    }

    @media (max-width: 640px) {
      .chat-app {
        border: 0;
      }

      .chat-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .status {
        text-align: left;
      }

      .message {
        max-width: 94%;
      }

      .connection-panel {
        grid-template-columns: 1fr;
      }

      .composer {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="chat-app" aria-label="CipherLane chatbot">
    <header class="chat-header">
      <div class="brand">
        <h1>CipherLane</h1>
        <span>Safe and secure messenger</span>
      </div>
      <div class="status" id="status">Online</div>
    </header>

    <section class="messages" id="messages" aria-live="polite"></section>

    <section class="connection-panel" aria-label="Secure chat connection">
      <input id="server-url" type="text" value="firebase" aria-label="Server URL" />
      <input id="you-id" type="text" placeholder="You" aria-label="Your ID" />
      <input id="friend-id" type="text" placeholder="Friend" aria-label="Friend ID" />
      <button id="connect-button" type="button">Connect</button>
      <button id="secure-button" class="secondary" type="button">Start Secure</button>
    </section>

    <form class="composer" id="composer">
      <input id="message-input" type="text" autocomplete="off" placeholder="Type a message" />
      <select id="country-select" hidden>
        <option value="">Select country</option>
        <option>Australia</option>
        <option>Brazil</option>
        <option>Canada</option>
        <option>France</option>
        <option>Germany</option>
        <option>India</option>
        <option>Japan</option>
        <option>Singapore</option>
        <option>United Arab Emirates</option>
        <option>United Kingdom</option>
        <option>United States</option>
      </select>
      <button type="submit">Send</button>
    </form>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      addDoc,
      collection,
      getFirestore,
      onSnapshot,
      query,
      serverTimestamp,
      where
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const messages = document.getElementById("messages");
    const composer = document.getElementById("composer");
    const messageInput = document.getElementById("message-input");
    const countrySelect = document.getElementById("country-select");
    const serverUrlInput = document.getElementById("server-url");
    const youIdInput = document.getElementById("you-id");
    const friendIdInput = document.getElementById("friend-id");
    const connectButton = document.getElementById("connect-button");
    const secureButton = document.getElementById("secure-button");
    let firstName = "";
    let secondName = "";
    let country = "";
    let phoneNumber = "";
    let emailId = "";
    let generatedSeed = "";
    let currentStep = "firstName";
    let socket = null;
    let keyPair = null;
    let sharedKey = null;
    let secureReady = false;
    let demoMode = false;
    let firebaseMode = false;
    let unsubscribeInbox = null;
    let connectedAt = 0;
    const seenCloudMessages = new Set();
    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    const seedMessage = "Unlike other messengers, CipherLane does not use your phone number as your messenger identity. This helps keep your ID private. To continue, you need to generate a seed. Your seed is your CipherLane identity, so please click Generate Seed to create it.";

    if (window.location.protocol === "https:") {
      serverUrlInput.value = "firebase";
    } else if (window.location.protocol.startsWith("http") && window.location.hostname) {
      serverUrlInput.value = `ws://${window.location.hostname}:8765`;
    }

    function addMessage(text, variant = "bot") {
      const item = document.createElement("div");
      item.className = `message ${variant}`;
      item.textContent = text;
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    }

    function addActionButton(label, onClick) {
      const button = document.createElement("button");
      button.className = "seed-action";
      button.type = "button";
      button.textContent = label;
      button.addEventListener("click", onClick);
      messages.appendChild(button);
      messages.scrollTop = messages.scrollHeight;
      return button;
    }

    function getBotReply(text) {
      const normalized = text.toLowerCase();
      if (normalized.includes("secure") || normalized.includes("safe")) {
        return "CipherLane keeps the conversation focused on privacy, verified sessions, and secure messaging.";
      }
      if (normalized.includes("hello") || normalized.includes("hi")) {
        return `Hello${firstName ? ` ${firstName}` : ""}. CipherLane is ready.`;
      }
      return "Message received. CipherLane chatbot is active.";
    }

    function getYourId() {
      return youIdInput.value.trim();
    }

    function getFriendId() {
      return friendIdInput.value.trim();
    }

    function bytesToBase64(bytes) {
      return btoa(String.fromCharCode(...new Uint8Array(bytes)));
    }

    function base64ToBytes(value) {
      return Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
    }

    async function generateKeyPair() {
      keyPair = await crypto.subtle.generateKey(
        { name: "ECDH", namedCurve: "P-256" },
        false,
        ["deriveKey"]
      );
      return keyPair;
    }

    async function exportPublicKey() {
      if (!keyPair) {
        await generateKeyPair();
      }
      const raw = await crypto.subtle.exportKey("raw", keyPair.publicKey);
      return bytesToBase64(raw);
    }

    async function deriveSharedKey(peerPublicKeyBase64) {
      if (!keyPair) {
        await generateKeyPair();
      }
      const peerPublicKey = await crypto.subtle.importKey(
        "raw",
        base64ToBytes(peerPublicKeyBase64),
        { name: "ECDH", namedCurve: "P-256" },
        false,
        []
      );
      sharedKey = await crypto.subtle.deriveKey(
        { name: "ECDH", public: peerPublicKey },
        keyPair.privateKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
      );
      secureReady = true;
    }

    async function encryptText(text) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encrypted = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        sharedKey,
        new TextEncoder().encode(text)
      );
      return {
        iv: bytesToBase64(iv),
        ciphertext: bytesToBase64(encrypted),
      };
    }

    async function decryptText(payload) {
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: base64ToBytes(payload.iv) },
        sharedKey,
        base64ToBytes(payload.ciphertext)
      );
      return new TextDecoder().decode(decrypted);
    }

    function sendRelayMessage(payload) {
      if (firebaseMode) {
        return sendCloudMessage(payload);
      }

      if (!socket || socket.readyState !== WebSocket.OPEN) {
        addMessage("Connect to the relay before sending secure messages.");
        return false;
      }
      socket.send(JSON.stringify({
        ...payload,
        from: getYourId(),
        to: getFriendId(),
        expires_at: Date.now() + 300000,
      }));
      return true;
    }

    function sendCloudMessage(payload) {
      const yourId = getYourId();
      const friendId = getFriendId();
      if (!yourId || !friendId) {
        addMessage("Enter both seed IDs before sending secure messages.");
        return false;
      }

      addDoc(collection(db, "cipherlane_messages"), {
        ...payload,
        from: yourId,
        to: friendId,
        createdAt: Date.now(),
        expires_at: Date.now() + 300000,
        serverCreatedAt: serverTimestamp(),
      }).catch(() => {
        addMessage("Cloud relay write failed. Check Firebase rules for cipherlane_messages.");
      });
      return true;
    }

    function connectCloudRelay() {
      const yourId = getYourId();
      if (!yourId) {
        addMessage("Enter your seed ID before connecting.");
        return;
      }

      if (unsubscribeInbox) {
        unsubscribeInbox();
      }

      firebaseMode = true;
      demoMode = false;
      connectedAt = Date.now() - 5000;
      seenCloudMessages.clear();

      const inboxQuery = query(
        collection(db, "cipherlane_messages"),
        where("to", "==", yourId)
      );

      unsubscribeInbox = onSnapshot(inboxQuery, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          if (change.type === "removed") {
            return;
          }

          const data = change.doc.data();
          const createdAt = Number(data.createdAt || 0);
          if (seenCloudMessages.has(change.doc.id) || createdAt < connectedAt || data.expires_at < Date.now()) {
            return;
          }

          seenCloudMessages.add(change.doc.id);
          handleRelayMessage(data);
        });
      }, () => {
        firebaseMode = false;
        addMessage("Cloud relay connection failed. Check Firebase Firestore access.");
      });

      addMessage("Connected to cloud relay. Ask your friend to connect with the opposite seed IDs.");
    }

    async function handleRelayMessage(data) {
      if (data.type === "connected") {
        addMessage("Connected to relay. Start Secure when your friend is online.");
        return;
      }

      if (data.type === "error") {
        addMessage(`Relay error: ${data.message || "Unknown error"}`);
        return;
      }

      if (data.type === "key_exchange") {
        await deriveSharedKey(data.public_key);
        sendRelayMessage({
          type: "key_exchange_response",
          public_key: await exportPublicKey(),
        });
        addMessage(`Secure channel established with ${data.from}.`);
        return;
      }

      if (data.type === "key_exchange_response") {
        await deriveSharedKey(data.public_key);
        sendRelayMessage({ type: "key_confirmed" });
        addMessage(`Secure channel established with ${data.from}.`);
        return;
      }

      if (data.type === "key_confirmed") {
        addMessage(`Secure channel confirmed with ${data.from}.`);
        return;
      }

      if (data.type === "chat") {
        if (!sharedKey) {
          addMessage("Encrypted message received before the secure channel was ready.");
          return;
        }
        try {
          const text = await decryptText(data.content);
          addMessage(text);
        } catch {
          addMessage("Could not decrypt the incoming message.");
        }
      }
    }

    function connectToRelay() {
      const serverUrl = serverUrlInput.value.trim();
      const yourId = getYourId();
      if (!serverUrl || !yourId) {
        addMessage("Enter a server URL and your ID before connecting.");
        return;
      }

      if (serverUrl.toLowerCase() === "firebase" || serverUrl.toLowerCase() === "cloud") {
        connectCloudRelay();
        return;
      }

      firebaseMode = false;
      if (unsubscribeInbox) {
        unsubscribeInbox();
        unsubscribeInbox = null;
      }

      if (socket) {
        socket.close();
      }

      demoMode = false;
      socket = new WebSocket(serverUrl);
      socket.addEventListener("open", () => {
        socket.send(JSON.stringify({ client_id: yourId }));
      });
      socket.addEventListener("message", async (event) => {
        try {
          await handleRelayMessage(JSON.parse(event.data));
        } catch {
          addMessage("Received an unreadable relay message.");
        }
      });
      socket.addEventListener("close", () => {
        if (demoMode) {
          return;
        }
        secureReady = false;
        sharedKey = null;
        addMessage("Disconnected from relay.");
      });
      socket.addEventListener("error", () => {
        if (getFriendId() === "CL-FRIEND01") {
          demoMode = true;
          secureReady = true;
          addMessage("Demo friend CL-FRIEND01 is ready locally. You can send a message now.");
          return;
        }
        addMessage("Relay connection failed. Start server.py and try Connect again.");
      });
    }

    async function startSecureChat() {
      if (!getFriendId()) {
        addMessage("Enter your friend's ID before starting secure chat.");
        return;
      }
      if (demoMode || getFriendId() === "CL-FRIEND01") {
        demoMode = true;
        secureReady = true;
        addMessage("Demo secure channel established with CL-FRIEND01.");
        return;
      }
      if (!firebaseMode && (!socket || socket.readyState !== WebSocket.OPEN)) {
        addMessage("Click Connect before starting secure chat.");
        return;
      }

      await generateKeyPair();
      const sent = sendRelayMessage({
        type: "key_exchange",
        public_key: await exportPublicKey(),
      });
      if (sent) {
        addMessage(`Secure request sent to ${getFriendId()}.`);
      }
    }

    function showSeedStep() {
      addMessage(seedMessage);
      addActionButton("Generate Seed", (event) => {
        const button = event.currentTarget;
        generatedSeed = `CL-${Math.random().toString(36).slice(2, 10).toUpperCase()}`;
        button.remove();
        addMessage(`Seed generated: ${generatedSeed}`);
        window.setTimeout(showSeedConfirmationStep, 250);
      });
    }

    function showSeedConfirmationStep() {
      addMessage("Please confirm and save your seed. This seed is your private CipherLane identity. Keep it safe, because it will be used to recover or verify your account.");
      addActionButton("Save Seed", async () => {
        localStorage.setItem("cipherlane_seed", generatedSeed);
        try {
          await navigator.clipboard.writeText(generatedSeed);
          addMessage("Seed saved locally and copied to clipboard.");
        } catch {
          addMessage("Seed saved locally. Please write it down and keep it safe.");
        }
      });
      addActionButton("I Have Saved My Seed", (event) => {
        event.currentTarget.remove();
        showFirstChatStep();
      });
    }

    function showFirstChatStep() {
      addMessage("Would you like to create your first secure chat now?");
      addActionButton("Start Secure Chat", () => {
        addMessage("Secure chat is ready. Use Server URL firebase, enter both seed IDs, connect, then start secure.");
        currentStep = "chat";
        messageInput.disabled = false;
        messageInput.placeholder = "Type a message";
        messageInput.type = "text";
        messageInput.focus();
      });
      addActionButton("Invite Contact", () => {
        addMessage("Invite flow is ready. Share your CipherLane seed ID only with trusted contacts.");
        currentStep = "chat";
        messageInput.disabled = false;
        messageInput.placeholder = "Type a message";
        messageInput.type = "text";
        messageInput.focus();
      });
    }

    composer.addEventListener("submit", (event) => {
      event.preventDefault();
      if (currentStep === "country") {
        const selectedCountry = countrySelect.value;
        if (!selectedCountry) {
          countrySelect.focus();
          return;
        }

        country = selectedCountry;
        addMessage(country, "user");
        countrySelect.hidden = true;
        messageInput.hidden = false;
        messageInput.placeholder = "Phone number";
        messageInput.type = "tel";
        currentStep = "phone";
        window.setTimeout(() => addMessage("What is your phone number"), 250);
        messageInput.focus();
        return;
      }

      const text = messageInput.value.trim();
      if (!text) {
        return;
      }

      addMessage(text, "user");
      messageInput.value = "";
      if (currentStep === "phone") {
        phoneNumber = text;
        messageInput.placeholder = "Email ID";
        messageInput.type = "email";
        currentStep = "email";
        window.setTimeout(() => addMessage("Email ID"), 250);
        return;
      }

      if (currentStep === "email") {
        emailId = text;
        messageInput.placeholder = "Generate seed to continue";
        messageInput.disabled = true;
        currentStep = "seed";
        window.setTimeout(showSeedStep, 250);
        return;
      }

      if (currentStep === "chat") {
        if (demoMode && secureReady) {
          window.setTimeout(() => addMessage(`CL-FRIEND01 received: ${text}`), 250);
        } else if ((firebaseMode || (socket && socket.readyState === WebSocket.OPEN)) && secureReady && getFriendId()) {
          encryptText(text).then((content) => {
            sendRelayMessage({ type: "chat", content });
          }).catch(() => addMessage("Could not encrypt the message."));
        } else {
          window.setTimeout(() => addMessage(getBotReply(text)), 250);
        }
        return;
      }

      if (currentStep === "firstName" && !firstName) {
        firstName = text;
        messageInput.placeholder = "Second name";
        currentStep = "secondName";
        window.setTimeout(() => addMessage("Please enter your Second Name"), 250);
        return;
      }

      if (currentStep === "secondName" && !secondName) {
        secondName = text;
        messageInput.hidden = true;
        countrySelect.hidden = false;
        currentStep = "country";
        window.setTimeout(() => {
          addMessage("What is your Country");
          countrySelect.focus();
        }, 250);
        return;
      }

      window.setTimeout(() => addMessage(getBotReply(text)), 250);
    });

    const savedSeed = localStorage.getItem("cipherlane_seed");

    if (savedSeed) {
      generatedSeed = savedSeed;
      currentStep = "chat";
      youIdInput.value = savedSeed;
      addMessage("Seed found locally. Secure chat is ready. Ask your friend for their seed ID, enter it in Friend, click Connect, then Start Secure.");
      messageInput.placeholder = "Type a message";
      messageInput.focus();
    } else {
      addMessage("welcome to cipherlane - one of the most safe and secure messengers");
      addMessage("Please enter your First Name");
      messageInput.placeholder = "First name";
      messageInput.focus();
    }

    connectButton.addEventListener("click", connectToRelay);
    secureButton.addEventListener("click", startSecureChat);
  </script>
</body>
</html>
