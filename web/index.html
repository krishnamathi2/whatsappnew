<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050b0f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <title>CipherLane</title>
  <style>
    :root {
      --font-ui: "Manrope", "Inter", "Segoe UI", system-ui, sans-serif;
      --font-display: "Space Grotesk", "Manrope", "Inter", "Segoe UI", system-ui, sans-serif;
      --cyan: #7be9f2;
      --blue: #3f6fd8;
      --line: rgba(106, 230, 244, 0.13);
      --text: #f7f7f2;
      --muted: #c7d5dc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #05090d;
      color: var(--text);
      font-family: var(--font-ui);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 52% 48%, rgba(57, 148, 255, 0.14), transparent 33%),
        linear-gradient(180deg, #05080b 0, #081015 100%);
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 5;
      width: 270px;
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #151617;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 18px 0 54px rgba(5, 7, 12, 0.24);
    }

    .sidebar a {
      min-height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.05);
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
    }

    .sidebar a:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .hero {
      position: relative;
      width: min(1180px, calc(100vw - 270px));
      min-height: min(700px, 100vh);
      margin-left: 270px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-top: 1px solid rgba(117, 233, 248, 0.24);
      border-bottom: 1px solid rgba(117, 233, 248, 0.2);
      background:
        linear-gradient(rgba(101, 224, 244, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(101, 224, 244, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(87, 225, 238, 0.08), transparent 14%, transparent 86%, rgba(87, 225, 238, 0.08)),
        #05090d;
      background-size: 138px 138px, 138px 138px, auto, auto;
    }

    .hero::before {
      content: "";
      position: absolute;
      left: 6%;
      right: 6%;
      bottom: 15%;
      height: 55%;
      border: 3px solid rgba(126, 232, 246, 0.58);
      border-bottom: 0;
      border-radius: 999px 999px 0 0;
      box-shadow:
        0 0 0 18px rgba(92, 218, 238, 0.045),
        0 0 0 36px rgba(92, 218, 238, 0.026),
        0 0 80px rgba(76, 208, 235, 0.18);
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 5%;
      right: 5%;
      bottom: 12%;
      height: 36px;
      background: linear-gradient(90deg, transparent, rgba(100, 221, 242, 0.18), transparent);
      pointer-events: none;
    }

    .chart {
      position: absolute;
      inset: 22% 8% 20%;
      pointer-events: none;
    }

    .chart::before,
    .chart::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(100, 221, 242, 0.48), transparent);
      transform-origin: center;
    }

    .chart::before {
      bottom: 32%;
      transform: rotate(-12deg);
    }

    .chart::after {
      bottom: 48%;
      transform: rotate(14deg);
    }

    .candle {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 7px;
      height: var(--h);
      border-radius: 4px;
      background: var(--c);
      box-shadow: 0 0 28px color-mix(in srgb, var(--c), transparent 34%);
    }

    .candle::before {
      content: "";
      position: absolute;
      left: 3px;
      top: -36px;
      width: 1px;
      height: calc(100% + 72px);
      background: color-mix(in srgb, var(--c), transparent 26%);
      opacity: 0.82;
    }

    .content {
      position: relative;
      z-index: 2;
      display: grid;
      justify-items: center;
      width: min(1040px, calc(100% - 64px));
      text-align: center;
      transform: translateY(18px);
    }

    .avatar {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin-bottom: 38px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(30, 226, 196, 0.95), rgba(89, 133, 255, 0.95)),
        radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.55), transparent 28%);
      box-shadow: 0 24px 80px rgba(94, 228, 246, 0.32);
      font: 700 34px/1 var(--font-display);
    }

    h1 {
      margin: 0 0 26px;
      color: var(--text);
      font-family: var(--font-display);
      font-size: clamp(60px, 7.6vw, 96px);
      line-height: 0.92;
      letter-spacing: -0.045em;
      font-weight: 700;
      text-shadow: 0 18px 58px rgba(0, 0, 0, 0.55);
      white-space: nowrap;
    }

    .byline,
    .tagline {
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 1.7vw, 20px);
      line-height: 1.45;
      font-weight: 600;
    }

    .byline {
      margin-bottom: 34px;
    }

    .byline strong {
      color: #d9faff;
      font-weight: 800;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
      margin-top: 46px;
    }

    .chips span {
      min-width: 162px;
      border: 1px solid rgba(119, 231, 247, 0.34);
      border-radius: 999px;
      padding: 13px 22px;
      color: #e9fbff;
      background: rgba(5, 16, 22, 0.78);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 14px 34px rgba(0, 0, 0, 0.24);
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
        display: block;
      }

      .sidebar {
        position: static;
        width: auto;
        min-height: auto;
      }

      .hero {
        width: 100%;
        margin-left: 0;
        min-height: 100vh;
      }

      .content {
        width: calc(100% - 32px);
      }

      .avatar {
        width: 84px;
        height: 84px;
        margin-bottom: 28px;
        font-size: 24px;
      }

      h1 {
        white-space: normal;
      }

      .chips {
        gap: 10px;
        margin-top: 32px;
      }

      .chips span {
        min-width: 0;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <nav class="sidebar" aria-label="CipherLane navigation">
    <a id="signin" href="#preview">Sign in</a>
    <a href="#preview">Tech Preview</a>
  </nav>

  <main class="hero" aria-label="CipherLane technology preview">
    <div class="chart" aria-hidden="true">
      <span class="candle" style="--x: 0%; --y: 52%; --h: 116px; --c: var(--blue);"></span>
      <span class="candle" style="--x: 5%; --y: 55%; --h: 62px; --c: var(--cyan);"></span>
      <span class="candle" style="--x: 10%; --y: 50%; --h: 84px; --c: var(--cyan);"></span>
      <span class="candle" style="--x: 16%; --y: 43%; --h: 116px; --c: var(--cyan);"></span>
      <span class="candle" style="--x: 22%; --y: 41%; --h: 126px; --c: var(--cyan);"></span>
      <span class="candle" style="--x: 28%; --y: 43%; --h: 118px; --c: var(--blue);"></span>
      <span class="candle" style="--x: 34%; --y: 48%; --h: 72px; --c: var(--cyan);"></span>
      <span class="candle" style="--x: 40%; --y: 46%; --h: 86px; --c: var(--blue);"></span>
      <span class="candle" style="--x: 66%; --y: 36%; --h: 132px; --c: var(--cyan);"></span>
      <span class="candle" style="--x: 72%; --y: 33%; --h: 148px; --c: var(--cyan);"></span>
      <span class="candle" style="--x: 78%; --y: 40%; --h: 96px; --c: var(--blue);"></span>
      <span class="candle" style="--x: 84%; --y: 43%; --h: 92px; --c: var(--cyan);"></span>
      <span class="candle" style="--x: 90%; --y: 39%; --h: 106px; --c: var(--cyan);"></span>
      <span class="candle" style="--x: 96%; --y: 33%; --h: 140px; --c: var(--cyan);"></span>
    </div>

    <section id="preview" class="content">
      <div class="avatar">CL</div>
      <h1>Privacy Through Time</h1>
      <p class="byline"><strong>CipherLane Team</strong> on 21 Jun 2026</p>
      <p class="tagline">Build now - rewind trust - watch it live</p>
      <div class="chips" aria-label="CipherLane privacy pillars">
        <span>Seed identity</span>
        <span>Verified sessions</span>
        <span>Member-approved circles</span>
      </div>
    </section>
  </main>
</body>
</html>
